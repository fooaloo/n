<!DOCTYPE html>
<html>
<head>
    <title>System Notification Demo</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Offline System Notification Demo</h1>
    <p>Click the button to get system notifications.</p>
    <button id="notifyBtn">Send Notifications</button>

    <script>
        const notifyBtn = document.getElementById('notifyBtn');

        // ===========================
        // CONFIGURATION (EASILY EDITABLE)
        // ===========================
        const amount_at_once = 24;       // Number of pop-ups per batch
        const the_wait_seconds = 2.0;    // CHANGED: OS notification queues require a delay (0.2s will freeze/lag)
        const the_wait = the_wait_seconds * 1000; 

        // Messages to send (edit these freely)
        const messages = [
            "⏰ Time to practice your skills!",
            "📚 Review your notes!",
            "💡 Try a new challenge!",
            "🚀 Keep up the momentum!"
        ];

        // ===========================
        // NOTIFICATION FUNCTIONS
        // ===========================
        
        // Asks for permission ONCE upfront before spamming notifications
        async function checkPermission() {
            if (!("Notification" in window)) {
                alert("This browser does not support system notifications.");
                return false;
            }
            if (Notification.permission === "granted") return true;
            if (Notification.permission === "denied") {
                alert("You blocked notifications. Enable them in your browser settings.");
                return false;
            }
            const permission = await Notification.requestPermission();
            return permission === "granted";
        }

        function sendSingleNotification(message, index) {
            // Added unique tags and slight visual differences so the OS doesn't collapse them into one single alert
            new Notification(`${message}`, {
                body: `Batch item #${index + 1}`,
                tag: `msg-id-${Date.now()}-${index}-${Math.random()}` 
            });
        }

        function sendAllNotifications() {
            // Cycles through the short message array to successfully send the full 'amount_at_once' quantity
            for (let i = 0; i < amount_at_once; i++) {
                const messageTemplate = messages[i % messages.length]; 
                sendSingleNotification(messageTemplate, i);
            }
        }

        // Button click triggers notifications after verifying permission
        notifyBtn.addEventListener('click', async () => {
            const allowed = await checkPermission();
            if (allowed) {
                sendAllNotifications();
            }
        });

        // Automatic repeating notifications
        setInterval(async () => {
            if (Notification.permission === "granted") {
                sendAllNotifications();
            }
        }, the_wait);

    </script>
</body>
</html>
