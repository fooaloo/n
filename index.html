<!DOCTYPE html>
<html>
<head>
    <title>System Notification Demo</title>
</head>
<body>
    <h1>Offline System Notification Demo</h1>
    <p>Click the button to get system notifications.</p>
    <button id="notifyBtn">Send Notifications</button>

    <script>
        const notifyBtn = document.getElementById('notifyBtn');

        // ===========================
        // CONFIGURATION (EASILY EDITABLE)
        // ===========================
const amount_at_once = 24; // Number of pop-ups per batch
const the_wait_seconds = 0.2; // Seconds between each batch
const the_wait = the_wait_seconds * 1000; // Converted to milliseconds

        // Messages to send (edit these freely)
        const messages = [
            "⏰ Time to practice your skills!",
            "📚 Review your notes!",
            "💡 Try a new challenge!",
            "🚀 Keep up the momentum!"
        ];

        // ===========================
        // NOTIFICATION FUNCTIONS
        // ===========================
        function sendSingleNotification(message) {
            if (!("Notification" in window)) {
                alert("This browser does not support system notifications.");
                return;
            }

            if (Notification.permission === "granted") {
                new Notification(message);
            } else if (Notification.permission === "denied") {
                alert("You blocked notifications. Enable them in your browser settings.");
            } else {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification(message);
                    } else {
                        alert("Notifications blocked. You won't receive system notifications.");
                    }
                });
            }
        }

        function sendAllNotifications() {
            // Send only up to 'amount_at_once' notifications
            for (let i = 0; i < Math.min(amount_at_once, messages.length); i++) {
                sendSingleNotification(messages[i]);
            }
        }

        // Button click triggers notifications
        notifyBtn.addEventListener('click', sendAllNotifications);

        // Automatic repeating notifications
        setInterval(() => {
            if (Notification.permission === "granted") {
                sendAllNotifications();
            }
        }, the_wait);

    </script>
</body>
</html>
