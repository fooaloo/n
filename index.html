<!DOCTYPE html>
<html>
<head>
    <title>System Notification Demo</title>
</head>
<body>
    <h1>Offline System Notification Demo</h1>
    <p>Click the button to get a system notification.</p>
    <button id="notifyBtn">Send Notification</button>

    <script>
        const notifyBtn = document.getElementById('notifyBtn');

        // Function to send a notification
        function sendNotification() {
            // Check if the browser supports notifications
            if (!("Notification" in window)) {
                alert("This browser does not support system notifications.");
                return;
            }

            // Handle permission states
            if (Notification.permission === "granted") {
                // Permission already granted, send notification
                new Notification("⏰ Time to practice your skills!");
            } else if (Notification.permission === "denied") {
                // Permission denied
                alert("You blocked notifications. Enable them in your browser settings to receive reminders.");
            } else {
                // Request permission
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("⏰ Time to practice your skills!");
                    } else {
                        alert("Notifications blocked. You won't receive system notifications.");
                    }
                });
            }
        }

        // Button click triggers notification
        notifyBtn.addEventListener('click', sendNotification);

        // Optional: Automatic repeating reminder every 1 minute
        // Comment out if you only want manual button notifications
        /*
        setInterval(() => {
            if (Notification.permission === "granted") {
                new Notification("⏰ Friendly reminder: Keep practicing!");
            }
        }, 60000); // 60000ms = 1 minute
        */
    </script>
</body>
</html>
