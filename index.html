<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline Notification App</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1e1e24;
        }
        button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: #1e1e24;
            background-color: #00ffcc;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,255,204,0.3);
        }
    </style>
</head>
<body>

    <button id="notifyBtn">Trigger Offline Notification</button>

    <script>
        // Register the offline service worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(() => console.log('Service Worker Registered'));
        }

        const button = document.getElementById('notifyBtn');

        button.addEventListener('click', async () => {
            if (!("Notification" in window)) {
                alert("Notifications not supported.");
                return;
            }

            // Ask for permission locally
            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                if (permission !== "granted") return;
            }

            // Trigger notification through the active registration (works offline)
            const registration = await navigator.serviceWorker.ready;
            registration.showNotification("Offline Alert", {
                body: "This notification was generated entirely offline!",
                tag: "offline-demand"
            });
        });
    </script>
</body>
</html>
